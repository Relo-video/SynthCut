name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # smoke-security and smoke-jobs synthesize their own media with ffmpeg.
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # The media-free / self-synthesizing smoke subset (no model downloads).
      - name: Smoke — compositor plan (pure logic)
        run: npx tsx apps/desktop/scripts/smoke-composite.ts

      - name: Smoke — CLIP tokenizer (pure logic)
        run: npx tsx packages/core/scripts/smoke-clip-tokenizer.ts

      - name: Smoke — security (token auth + /file allowlist)
        run: npx tsx packages/core/scripts/smoke-security.ts

      - name: Smoke — jobs (background export, progress, cancel)
        run: npx tsx packages/core/scripts/smoke-jobs.ts
